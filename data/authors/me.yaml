experience:
  - role: Research Assistant
    org: University of Washington
    start: 2023-06-01
    summary: |
      Developed an end-to-end framework for decentralized energy planning using multilayered deep neural networks (ResNet50+, DeepLabv3+, NLP, and FT-Transformers) to automate site selection and demand forecasting while integrating community-driven inputs. Led stakeholder engagement with 15 innovators and investors across Africa to identify sector challenges and is currently preparing a paper with policy recommendations to improve electrification planning. Designed data collection tools using KoboToolbox, interviews, and geospatial mapping to capture energy needs in 75 Fijian villages, and conducted demand estimation for mini-grid projects through quantitative and qualitative analysis. Applied statistical modeling and load profiling to optimize system design using XENDEE/HOMER software, minimizing annual project costs and improving resource allocation..
    
  - role: Teaching Assistant
    org: University of Washington
    start: 2025-01-01
    end: 2025-03-31
    summary: |
      Assisted teaching Renewable Energy Technologies and Integration: Support course instruction by preparing in-class problem sets, grading quizzes and exams, and conducting office hours to assist students with course material. .

